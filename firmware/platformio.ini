[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
    ESP32Async/ESPAsyncWebServer@^3.6.0
    ESP32Async/AsyncTCP@^3.3.2
    h2zero/NimBLE-Arduino@^1.4.2
build_flags =
    -DCORE_DEBUG_LEVEL=1

[env:native]
platform = native
test_framework = unity
test_build_src = true
build_src_filter =
    +<*>
    -<main.cpp>
    -<sensors.cpp>
    -<motors.cpp>
    -<transport_serial.cpp>
    -<transport_wifi.cpp>
    -<transport_ble.cpp>
build_flags =
    -std=gnu++17
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
